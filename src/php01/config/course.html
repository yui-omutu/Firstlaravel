if ($_SERVER["REQUEST_METHOD"] == "POST") {

    $birthday = $_POST["birthday"];

    // とりあえず年だけ取り出す
    $year = date("Y", strtotime($birthday));

    // 仮のロジック（簡易版）
    if ($year % 6 == 0) {
        echo "あなたは土星人＋です";
    } elseif ($year % 6 == 1) {
        echo "あなたは金星人−です";
    } else {
        echo "他の星人です";
    }
}
